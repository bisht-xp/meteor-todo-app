<body>
  {{> mainContainer}}
</body>

<template name="mainContainer">
  <div class="app">

    <header>
      <div class="app-bar">
        <div class="app-header">
          <h1>Taskify</h1>
        </div>
        {{#if isUserLogged}}
          <div class="user">{{getUser.username}}
            <i data-lucide="log-out"></i>
          </div>
        {{/if}}
      </div>
    </header>

    <div class="main">

      {{#if isLoggingIn}}
        
        <div class="loading">Loading</div>

      {{else}}
        {{#if isUserLogged}}
          <div>{{> React component=taskListComponent}}</div>
          <hr class="section-divider" />
          <div>{{> React component=reactComponent}}</div>
        {{else}}
          {{> login}}
        {{/if}}
      {{/if}}

    </div>
  </div>
</template>
