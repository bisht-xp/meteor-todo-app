<template name="login">
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <h1>Taskify</h1>
        <p>{{#if showSignup}}Create your account{{else}}Welcome back{{/if}}</p>
      </div>

      {{! ── Login form ── }}
      {{#unless showSignup}}
      <form class="auth-form login-fields">

        <div class="field">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Enter username"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
        </div>

        {{! Inline error — no alert() }}
        {{#if authError}}
          <div class="auth-error">{{authError}}</div>
        {{/if}}

        <button type="submit" class="btn-submit">Sign in</button>
      </form>
      {{/unless}}

      {{! ── Signup form ── }}
      {{#if showSignup}}
      <form class="auth-form register-fields">

        <div class="field">
          <label>Username</label>
          <input
            type="text"
            name="username"
            placeholder="Choose a username"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="At least 6 characters"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input
            type="password"
            name="confirmPassword"
            placeholder="Repeat your password"
            autocomplete="new-password"
            required
          />
        </div>

        {{! Inline error — no alert() }}
        {{#if authError}}
          <div class="auth-error">{{authError}}</div>
        {{/if}}

        <button type="submit" class="btn-submit">Create account</button>
      </form>
      {{/if}}

      {{! ── Toggle ── }}
      <div class="auth-toggle">
        {{#if showSignup}}
          Already have an account?
          <span class="auth-toggle-link">Sign in</span>
        {{else}}
          Don't have an account?
          <span class="auth-toggle-link">Sign up</span>
        {{/if}}
      </div>

    </div>
  </div>
</template>
